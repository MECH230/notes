project:
  type: book


title: "MECH230 Dynamics Notes"
author: "Theresa Honein"
date: "Spring 2026"
number-sections: true

engine: knitr

book:
  sidebar:
    style: "docked"
    search: true
    collapse-level: 2 # This ensures ## sections are visible/expanded by default
  chapters:
    - index.qmd
    - part: "Preliminaries"
      chapters:
        - preliminaries/active_learning.qmd
        # - preliminaries/notation.qmd
    - part: "System of Particles"
      chapters:
        - system_of_particles/system_of_particles.qmd
    - part: "Rigid Body Dynamics"
      chapters: 
        - rigid_body_dynamics/rigid_body_kinematics.qmd
        - rigid_body_dynamics/rigid_body_kinetics.qmd
        - rigid_body_dynamics/work_energy_theorem.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib


format:
  html:
    theme:
      - cosmo # Try: lumen, flatly, quartz, or materia
      - brand
  pdf:
    documentclass: scrreprt
    include-in-header:
      text: |
        \usepackage{tikz}


